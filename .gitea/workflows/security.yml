name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run govulncheck
        run: govulncheck ./...

  workflow-policy:
    name: Workflow SHA policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for tag-pinned actions
        run: |
          VIOLATIONS=$(grep -rn 'uses:.*@v[0-9]' \
            .github/workflows/ .gitea/workflows/ .forgejo/workflows/ 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Tag-pinned actions found — pin to full commit SHA:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: all actions pinned to SHA"
