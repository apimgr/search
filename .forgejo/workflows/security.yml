name: Security

on:
  push:
    branches:
      - main
      - master
      - devel
  pull_request:
    branches:
      - main
      - master
      - devel
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECTNAME: search
  CGO_ENABLED: "0"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install dependencies
        run: apk add --no-cache git bash

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./src/...

  staticcheck:
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install dependencies
        run: apk add --no-cache git bash

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./src/...

  dependency-review:
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install dependencies
        run: apk add --no-cache git bash

      - name: Verify go.sum integrity
        run: go mod verify

      - name: Check for forbidden licenses
        run: |
          go install github.com/google/go-licenses/v2@latest 2>/dev/null || \
            go install github.com/google/go-licenses@latest
          go-licenses check ./src/... \
            --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0 || true
