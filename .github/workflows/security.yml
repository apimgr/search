name: Security

on:
  push:
    branches:
      - main
      - master
      - devel
      - beta
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  go-vet:
    name: Go vet and build check
    runs-on: ubuntu-latest
    container: golang:alpine

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify go.sum is tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Run go vet
        env:
          CGO_ENABLED: 0
        run: go vet ./...

      - name: Check for CGO usage
        run: |
          if grep -r -- 'import "C"' ./src/ 2>/dev/null; then
            echo "CGO detected — CGO_ENABLED=0 is mandatory"
            exit 1
          fi

  workflow-hardening:
    name: Workflow hardening check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for unpinned actions
        run: |
          FAIL=0
          for f in .github/workflows/*.yml .gitea/workflows/*.yml; do
            [ -f "$f" ] || continue
            if grep -E -- 'uses: [^@]+@[^@]+$' "$f" | grep -v -- '#' | grep -qvE '@[0-9a-f]{40}'; then
              echo "FAIL: $f contains actions not pinned to a full SHA"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Check for secrets in source
        run: |
          PATTERNS='password\s*=\s*"[^"]+'\''+|api_key\s*=\s*"[^"]+'\''+|secret\s*=\s*"[^"]+'\''+|token\s*=\s*"[^"]+'\''+'
          if grep -rEi -- "$PATTERNS" ./src/ 2>/dev/null | grep -v '_test.go'; then
            echo "Possible hardcoded secrets found in src/"
            exit 1
          fi
