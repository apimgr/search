name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PROJECTNAME: search
  PROJECTORG: apimgr

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download modules
        run: go mod download

      - name: Run tests with coverage
        run: |
          PKGS=$(go list ./... | grep -v '/src/service')
          mkdir -p "/tmp/${PROJECTORG}"
          COVDIR=$(mktemp -d "/tmp/${PROJECTORG}/${PROJECTNAME}-XXXXXX")
          go test -cover -coverprofile="$COVDIR/coverage.out" $PKGS
          go tool cover -func="$COVDIR/coverage.out"
          THRESHOLD=80
          PCT=$(go tool cover -func="$COVDIR/coverage.out" | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage ${PCT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage: ${PCT}% (threshold: ${THRESHOLD}%)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: staticcheck ./...

  build:
    name: Build
    needs: [test, lint]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set build info
        run: |
          echo "VERSION=$(cat release.txt 2>/dev/null || echo "devel")" >> "$GITHUB_ENV"
          echo "COMMIT_ID=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")" >> "$GITHUB_ENV"
          if [ -f site.txt ]; then
            echo "OFFICIALSITE=$(cat site.txt)" >> "$GITHUB_ENV"
          else
            echo "OFFICIALSITE=${{ secrets.OFFICIALSITE }}" >> "$GITHUB_ENV"
          fi

      - name: Download modules
        run: go mod download

      - name: Build binaries
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/config.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/config.CommitID=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/config.BuildDate=${BUILD_DATE}' \
            -X 'github.com/apimgr/search/src/config.OfficialSite=${OFFICIALSITE}' \
            -X 'github.com/apimgr/search/src/version.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/version.Commit=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/version.BuildDate=${BUILD_DATE}'"
          CLI_LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/client/cmd.ProjectName=${PROJECTNAME}' \
            -X 'github.com/apimgr/search/src/client/cmd.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/client/cmd.CommitID=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/client/cmd.BuildDate=${BUILD_DATE}' \
            -X 'github.com/apimgr/search/src/client/cmd.OfficialSite=${OFFICIALSITE}' \
            -X 'github.com/apimgr/search/src/client/api.ProjectName=${PROJECTNAME}' \
            -X 'github.com/apimgr/search/src/client/api.Version=${VERSION}'"
          GOOS=linux GOARCH=amd64 go build -buildvcs=false -trimpath \
            -ldflags "${LDFLAGS}" -o /tmp/search-linux-amd64 ./src
          GOOS=linux GOARCH=arm64 go build -buildvcs=false -trimpath \
            -ldflags "${LDFLAGS}" -o /tmp/search-linux-arm64 ./src
          if [ -d src/client ]; then
            GOOS=linux GOARCH=amd64 go build -buildvcs=false -trimpath \
              -ldflags "${CLI_LDFLAGS}" -o /tmp/search-cli-linux-amd64 ./src/client
            GOOS=linux GOARCH=arm64 go build -buildvcs=false -trimpath \
              -ldflags "${CLI_LDFLAGS}" -o /tmp/search-cli-linux-arm64 ./src/client
            ls -lh /tmp/search-linux-amd64 /tmp/search-linux-arm64 \
              /tmp/search-cli-linux-amd64 /tmp/search-cli-linux-arm64
          else
            ls -lh /tmp/search-linux-amd64 /tmp/search-linux-arm64
          fi
          echo "Build OK"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan secrets (push — incremental)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6
        with:
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

      - name: Scan secrets (PR — full history)
        if: github.event_name != 'push'
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6
        with:
          extra_args: --only-verified

  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download modules
        run: go mod download

      - name: Run govulncheck
        run: govulncheck ./...
