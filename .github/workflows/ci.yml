name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run gofmt
        run: |
          UNFMT=$(gofmt -l ./src/ 2>/dev/null)
          if [ -n "$UNFMT" ]; then
            echo "::error::The following files are not gofmt formatted:"
            echo "$UNFMT"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./src/...
      - name: Run staticcheck
        run: staticcheck ./src/...

  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run unit tests
        run: go test -cover -coverprofile=/tmp/coverage.out -count=1 -timeout=120s ./src/...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=60
          PCT=$(go tool cover -func=/tmp/coverage.out | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi

  build:
    if: github.event_name != 'schedule'
    needs: [lint, test]
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Verify build
        run: go build ./src/...

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@2a4cf6ecb55c44c95e49c51ef8c1e8cb9038b8b7
        with:
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  workflow-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check for unpinned actions
        run: |
          FAIL=0
          for f in .github/workflows/*.yml .gitea/workflows/*.yml .forgejo/workflows/*.yml; do
            [ -f "$f" ] || continue
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^\s*uses:\s+[^@]+@[^@]+$'; then
                if ! echo "$line" | grep -qE '@[0-9a-f]{40}'; then
                  echo "::error file=$f::Unpinned action: $line"
                  FAIL=1
                fi
              fi
            done < "$f"
          done
          exit $FAIL

  vuln-scan:
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run govulncheck
        run: govulncheck ./...
