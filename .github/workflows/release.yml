name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECTNAME: search

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set build info
        run: |
          if [ -f release.txt ]; then
            echo "VERSION=$(cat release.txt)" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date +"%a %b %d, %Y at %H:%M:%S %Z")" >> "$GITHUB_ENV"
          if [ -f site.txt ]; then
            echo "OFFICIALSITE=$(cat site.txt)" >> "$GITHUB_ENV"
          else
            echo "OFFICIALSITE=${{ secrets.OFFICIALSITE }}" >> "$GITHUB_ENV"
          fi
          echo "OUTPUT=${PROJECTNAME}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" >> "$GITHUB_ENV"
          echo "CLI_OUTPUT=${PROJECTNAME}-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" >> "$GITHUB_ENV"

      - name: Build server
        run: |
          LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/config.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/config.CommitID=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/config.BuildDate=${BUILD_DATE}' \
            -X 'github.com/apimgr/search/src/config.OfficialSite=${OFFICIALSITE}' \
            -X 'github.com/apimgr/search/src/version.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/version.Commit=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/version.BuildDate=${BUILD_DATE}'"
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CGO_ENABLED=0 \
            -e GOFLAGS=-buildvcs=false \
            -e "GOOS=${{ matrix.goos }}" \
            -e "GOARCH=${{ matrix.goarch }}" \
            -e "OUTPUT=${OUTPUT}" \
            -e "LDFLAGS=${LDFLAGS}" \
            casjaysdev/go:latest \
            sh -c 'go mod download && go build -buildvcs=false -trimpath -ldflags "$LDFLAGS" -o "/workspace/$OUTPUT" ./src'

      - name: Build CLI
        if: hashFiles('src/client/') != ''
        run: |
          CLI_LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/client/cmd.ProjectName=${PROJECTNAME}' \
            -X 'github.com/apimgr/search/src/client/cmd.Version=${VERSION}' \
            -X 'github.com/apimgr/search/src/client/cmd.CommitID=${COMMIT_ID}' \
            -X 'github.com/apimgr/search/src/client/cmd.BuildDate=${BUILD_DATE}' \
            -X 'github.com/apimgr/search/src/client/cmd.OfficialSite=${OFFICIALSITE}' \
            -X 'github.com/apimgr/search/src/client/api.ProjectName=${PROJECTNAME}' \
            -X 'github.com/apimgr/search/src/client/api.Version=${VERSION}'"
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CGO_ENABLED=0 \
            -e GOFLAGS=-buildvcs=false \
            -e "GOOS=${{ matrix.goos }}" \
            -e "GOARCH=${{ matrix.goarch }}" \
            -e "CLI_OUTPUT=${CLI_OUTPUT}" \
            -e "CLI_LDFLAGS=${CLI_LDFLAGS}" \
            casjaysdev/go:latest \
            sh -c 'go mod download && go build -buildvcs=false -trimpath -ldflags "$CLI_LDFLAGS" -o "/workspace/$CLI_OUTPUT" ./src/client'

      - name: Upload server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROJECTNAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload CLI artifact
        if: hashFiles('src/client/') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.PROJECTNAME }}-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROJECTNAME }}-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set version
        run: |
          if [ -f release.txt ]; then
            echo "VERSION=$(cat release.txt)" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/release/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd /tmp/release
          sha256sum * > checksums.txt
          cat checksums.txt
          ls -lh

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          name: search ${{ env.VERSION }}
          files: /tmp/release/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
