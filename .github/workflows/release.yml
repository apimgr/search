name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    container:
      image: casjaysdev/go:latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-buildvcs=false"
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set version variables
        id: version
        run: |
          VERSION=$(cat release.txt 2>/dev/null || echo "${GITHUB_REF_NAME}")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OFFICIALSITE=$(cat site.txt 2>/dev/null || echo "")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "COMMIT=$COMMIT" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "OFFICIALSITE=$OFFICIALSITE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download modules
        run: go mod download

      - name: Build all platforms
        run: |
          mkdir -p /tmp/release
          LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/config.Version=${{ env.VERSION }}' \
            -X 'github.com/apimgr/search/src/config.CommitID=${{ env.COMMIT }}' \
            -X 'github.com/apimgr/search/src/config.BuildDate=${{ env.BUILD_DATE }}' \
            -X 'github.com/apimgr/search/src/config.OfficialSite=${{ env.OFFICIALSITE }}' \
            -X 'github.com/apimgr/search/src/version.Version=${{ env.VERSION }}' \
            -X 'github.com/apimgr/search/src/version.Commit=${{ env.COMMIT }}' \
            -X 'github.com/apimgr/search/src/version.BuildDate=${{ env.BUILD_DATE }}'"
          for pair in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64 \
            freebsd/amd64 freebsd/arm64; do
            OS="${pair%/*}"
            ARCH="${pair#*/}"
            OUTPUT="/tmp/release/search-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            echo "Building $OS/$ARCH..."
            GOOS="$OS" GOARCH="$ARCH" go build \
              -ldflags="$LDFLAGS" \
              -o "$OUTPUT" ./src
          done

      - name: Build CLI for all platforms (if present)
        run: |
          [ -d "src/client" ] || exit 0
          LDFLAGS="-s -w \
            -X 'github.com/apimgr/search/src/client/cmd.ProjectName=search' \
            -X 'github.com/apimgr/search/src/client/cmd.Version=${{ env.VERSION }}' \
            -X 'github.com/apimgr/search/src/client/cmd.CommitID=${{ env.COMMIT }}' \
            -X 'github.com/apimgr/search/src/client/cmd.BuildDate=${{ env.BUILD_DATE }}' \
            -X 'github.com/apimgr/search/src/client/cmd.OfficialSite=${{ env.OFFICIALSITE }}' \
            -X 'github.com/apimgr/search/src/client/api.ProjectName=search' \
            -X 'github.com/apimgr/search/src/client/api.Version=${{ env.VERSION }}'"
          for pair in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64 \
            freebsd/amd64 freebsd/arm64; do
            OS="${pair%/*}"
            ARCH="${pair#*/}"
            OUTPUT="/tmp/release/search-cli-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            echo "Building CLI $OS/$ARCH..."
            GOOS="$OS" GOARCH="$ARCH" go build \
              -ldflags="$LDFLAGS" \
              -o "$OUTPUT" ./src/client
          done

      - name: Generate checksums
        run: |
          cd /tmp/release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: /tmp/release/
          retention-days: 1

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: /tmp/release/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" /tmp/release/* \
            --title "search ${VERSION}" \
            --notes "Release ${VERSION}" \
            --latest
