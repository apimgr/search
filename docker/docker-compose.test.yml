name: search-test

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  search:
    image: ghcr.io/apimgr/search:latest
    container_name: search-test
    restart: "no"
    logging: *default-logging
    environment:
      - MODE=development
      - DEBUG=true
      - TZ=America/New_York
    ports:
      - "64581:80"
    volumes:
      # Runtime volumes (per AI.md PART 27)
      # Host ./volumes/{config,data} maps to container /config and /data
      # AI test workflow uses a temp directory; ./volumes/ resolves there
      - ./volumes/config:/config:z
      - ./volumes/data:/data:z
    networks:
      - search-test

networks:
  search-test:
    name: search-test
    external: false
